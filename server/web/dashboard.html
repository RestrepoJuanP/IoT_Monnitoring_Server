<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Monitor - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* --- Header --- */
        .header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 20px;
            color: #38bdf8;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        .status-dot.error { background: #ef4444; animation: none; }
        .status-dot.loading { background: #eab308; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .btn-logout {
            padding: 8px 16px;
            background: #475569;
            color: #e2e8f0;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-logout:hover { background: #64748b; }

        /* --- Stats cards --- */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            padding: 24px;
        }

        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 20px;
        }

        .stat-card .label {
            font-size: 13px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #f8fafc;
        }

        .stat-card .value.accent { color: #38bdf8; }
        .stat-card .value.green  { color: #22c55e; }
        .stat-card .value.orange { color: #f59e0b; }

        /* --- Contenido principal --- */
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 0 24px 24px;
        }

        @media (max-width: 900px) {
            .content { grid-template-columns: 1fr; }
        }

        .panel {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 20px;
        }

        .panel h2 {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 16px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        /* --- Tabla de sensores --- */
        .table-wrap {
            overflow-x: auto;
            max-height: 300px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            text-align: left;
            padding: 8px 12px;
            background: #0f172a;
            color: #94a3b8;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        td {
            padding: 8px 12px;
            border-top: 1px solid #1e293b;
        }

        tr:nth-child(even) { background: rgba(15, 23, 42, 0.4); }
        tr:hover { background: rgba(56, 189, 248, 0.05); }

        /* --- Alertas --- */
        .alert-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .alert-item {
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid #ef4444;
            padding: 10px 14px;
            margin-bottom: 8px;
            border-radius: 0 6px 6px 0;
            font-size: 13px;
        }

        .alert-item .alert-header {
            color: #fca5a5;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .alert-item .alert-detail {
            color: #94a3b8;
        }

        .no-data {
            color: #475569;
            font-style: italic;
            text-align: center;
            padding: 24px;
        }

        /* --- Mediciones recientes --- */
        .content-full {
            padding: 0 24px 24px;
        }

        .measurement-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #1e293b;
            font-size: 13px;
        }

        .measurement-item:last-child { border: none; }

        /* --- Refresh button --- */
        .refresh-bar {
            padding: 0 24px 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-refresh {
            padding: 8px 20px;
            background: #0ea5e9;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-refresh:hover { background: #0284c7; }
        .btn-refresh:disabled { background: #475569; cursor: not-allowed; }

        .auto-refresh {
            font-size: 13px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .last-update {
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>IoT Monitor — Dashboard</h1>
        <div class="header-right">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Conectado</span>
            </div>
            <a href="/" class="btn-logout">Cerrar Sesion</a>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-card">
            <div class="label">Sensores Activos</div>
            <div class="value accent" id="sensorCount">—</div>
        </div>
        <div class="stat-card">
            <div class="label">Operadores Conectados</div>
            <div class="value green" id="operatorCount">—</div>
        </div>
        <div class="stat-card">
            <div class="label">Uptime del Servidor</div>
            <div class="value" id="uptime">—</div>
        </div>
        <div class="stat-card">
            <div class="label">Alertas Recientes</div>
            <div class="value orange" id="alertCount">—</div>
        </div>
    </div>

    <!-- Refresh bar -->
    <div class="refresh-bar">
        <button class="btn-refresh" id="btnRefresh" onclick="fetchStatus()">Actualizar</button>
        <label class="auto-refresh">
            <input type="checkbox" id="autoRefresh" checked>
            Auto-refresh (5s)
        </label>
        <span class="last-update" id="lastUpdate"></span>
    </div>

    <!-- Paneles principales -->
    <div class="content">
        <!-- Sensores activos -->
        <div class="panel">
            <h2>Sensores Activos</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tipo</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="sensorsTable">
                        <tr><td colspan="3" class="no-data">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Alertas -->
        <div class="panel">
            <h2>Alertas</h2>
            <div class="alert-list" id="alertList">
                <div class="no-data">Cargando...</div>
            </div>
        </div>
    </div>

    <!-- Mediciones recientes -->
    <div class="content-full">
        <div class="panel">
            <h2>Mediciones Recientes</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Sensor</th>
                            <th>Tipo</th>
                            <th>Valor</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>
                    <tbody id="measurementsTable">
                        <tr><td colspan="4" class="no-data">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        var refreshTimer = null;

        /* Formatea segundos a un string legible (ej: "2h 15m 30s") */
        function formatUptime(seconds) {
            if (seconds < 60) return seconds + 's';
            var h = Math.floor(seconds / 3600);
            var m = Math.floor((seconds % 3600) / 60);
            var s = seconds % 60;
            var parts = [];
            if (h > 0) parts.push(h + 'h');
            if (m > 0) parts.push(m + 'm');
            if (s > 0 || parts.length === 0) parts.push(s + 's');
            return parts.join(' ');
        }

        /* Consulta el endpoint /status y actualiza toda la interfaz */
        function fetchStatus() {
            var btn = document.getElementById('btnRefresh');
            var dot = document.getElementById('statusDot');
            var txt = document.getElementById('statusText');

            btn.disabled = true;
            dot.className = 'status-dot loading';
            txt.textContent = 'Actualizando...';

            fetch('/status')
                .then(function(resp) {
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    return resp.json();
                })
                .then(function(data) {
                    /* Stats cards */
                    document.getElementById('sensorCount').textContent = data.sensores_activos;
                    document.getElementById('operatorCount').textContent = data.operadores_conectados;
                    document.getElementById('uptime').textContent = formatUptime(data.uptime_segundos);
                    document.getElementById('alertCount').textContent =
                        data.alertas_recientes ? data.alertas_recientes.length : 0;

                    /* Tabla de sensores */
                    var tbody = document.getElementById('sensorsTable');
                    if (data.sensores && data.sensores.length > 0) {
                        tbody.innerHTML = data.sensores.map(function(s) {
                            return '<tr>' +
                                '<td>' + escapeHtml(s.id) + '</td>' +
                                '<td>' + escapeHtml(s.tipo) + '</td>' +
                                '<td style="color:#22c55e">Activo</td>' +
                                '</tr>';
                        }).join('');
                    } else {
                        tbody.innerHTML = '<tr><td colspan="3" class="no-data">Sin sensores activos</td></tr>';
                    }

                    /* Alertas */
                    var alertDiv = document.getElementById('alertList');
                    if (data.alertas_recientes && data.alertas_recientes.length > 0) {
                        /* Mas recientes primero */
                        var alertas = data.alertas_recientes.slice().reverse();
                        alertDiv.innerHTML = alertas.map(function(a) {
                            return '<div class="alert-item">' +
                                '<div class="alert-header">' +
                                    escapeHtml(a.sensor) + ' — ' + escapeHtml(a.tipo) +
                                '</div>' +
                                '<div class="alert-detail">' +
                                    'Valor: ' + a.valor + ' | Umbral: ' + a.umbral +
                                    ' | ' + escapeHtml(a.timestamp) +
                                '</div>' +
                                '</div>';
                        }).join('');
                    } else {
                        alertDiv.innerHTML = '<div class="no-data">Sin alertas recientes</div>';
                    }

                    /* Mediciones recientes */
                    var measTbody = document.getElementById('measurementsTable');
                    if (data.mediciones_recientes && data.mediciones_recientes.length > 0) {
                        /* Mas recientes primero, limitar a 20 */
                        var meds = data.mediciones_recientes.slice().reverse().slice(0, 20);
                        measTbody.innerHTML = meds.map(function(m) {
                            return '<tr>' +
                                '<td>' + escapeHtml(m.sensor) + '</td>' +
                                '<td>' + escapeHtml(m.tipo) + '</td>' +
                                '<td>' + m.valor + '</td>' +
                                '<td>' + escapeHtml(m.timestamp) + '</td>' +
                                '</tr>';
                        }).join('');
                    } else {
                        measTbody.innerHTML = '<tr><td colspan="4" class="no-data">Sin mediciones</td></tr>';
                    }

                    /* Estado OK */
                    dot.className = 'status-dot';
                    txt.textContent = 'Conectado';
                    document.getElementById('lastUpdate').textContent =
                        'Ultima actualizacion: ' + new Date().toLocaleTimeString();
                })
                .catch(function(err) {
                    dot.className = 'status-dot error';
                    txt.textContent = 'Error de conexion';
                    console.error('Error al consultar /status:', err);
                })
                .finally(function() {
                    btn.disabled = false;
                });
        }

        /* Prevenir XSS en los datos del servidor */
        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        /* Auto-refresh cada 5 segundos */
        function setupAutoRefresh() {
            var checkbox = document.getElementById('autoRefresh');
            checkbox.addEventListener('change', function() {
                if (checkbox.checked) {
                    refreshTimer = setInterval(fetchStatus, 5000);
                } else {
                    clearInterval(refreshTimer);
                    refreshTimer = null;
                }
            });

            /* Iniciar auto-refresh */
            refreshTimer = setInterval(fetchStatus, 5000);
        }

        /* Arrancar */
        fetchStatus();
        setupAutoRefresh();
    </script>
</body>
</html>
