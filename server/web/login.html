<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Monitor - Iniciar Sesion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 24px;
            color: #38bdf8;
            margin-bottom: 4px;
        }

        .logo p {
            font-size: 14px;
            color: #94a3b8;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #38bdf8;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #0ea5e9;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background: #0284c7;
        }

        .error-msg {
            background: #7f1d1d;
            border: 1px solid #991b1b;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #fca5a5;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>IoT Monitor</h1>
            <p>Sistema de Monitoreo de Sensores</p>
        </div>

        <div class="error-msg" id="errorMsg">
            Credenciales invalidas. Intente de nuevo.
        </div>

        <form id="loginForm" action="/login" method="GET">
            <div class="form-group">
                <label for="user">Usuario</label>
                <input type="text" id="user" name="user"
                       placeholder="Ingrese su usuario" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="pass">Contrasena</label>
                <input type="password" id="pass" name="pass"
                       placeholder="Ingrese su contrasena" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login">Ingresar</button>
        </form>
    </div>

    <script>
        /* Mostrar mensaje de error si viene en la URL */
        (function() {
            var params = new URLSearchParams(window.location.search);
            if (params.has('error')) {
                var errorEl = document.getElementById('errorMsg');
                var errorType = params.get('error');
                if (errorType === 'credenciales_invalidas') {
                    errorEl.textContent = 'Credenciales invalidas. Intente de nuevo.';
                } else if (errorType === 'campos_vacios') {
                    errorEl.textContent = 'Debe ingresar usuario y contrasena.';
                } else {
                    errorEl.textContent = 'Error de autenticacion: ' + errorType;
                }
                errorEl.classList.add('visible');
            }
        })();
    </script>
</body>
</html>
